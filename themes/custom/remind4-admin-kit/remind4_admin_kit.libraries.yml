global-styling:
  version: 2.6
  css:
    theme:
      "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap": { type: external }
      css/app.css: {}
      css/main-content-global.css: {}
      css/header-professional.css: {}
      css/select2-professional.css: {}
      css/user-edit-form.css: {}
      css/views-admin-professional.css: {}
