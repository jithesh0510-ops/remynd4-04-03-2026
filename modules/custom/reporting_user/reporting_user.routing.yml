user.edit_company:
  path: '/user/{user}/edit/company'
  defaults:
    _entity_form: 'user.company'
    _title: 'Edit Company Profile'
  requirements:
    _permission: 'edit company users'
    _entity_access: 'user.update'

user.edit_coach:
  path: '/user/{user}/edit/coach'
  defaults:
    _entity_form: 'user.coach'
    _title: 'Edit Coach Profile'
  requirements:
    _permission: 'edit coach users'
    _entity_access: 'user.update'

user.edit_employee:
  path: '/user/{user}/edit/employee'
  defaults:
    _entity_form: 'user.employee'
    _title: 'Edit Employee Profile'
  requirements:
    _permission: 'edit employee users'
    _entity_access: 'user.update'

reporting_user.update_coach:
  path: '/reporting-user/update-coach'
  defaults:
    _controller: '\Drupal\reporting_user\Controller\InlineCoachController::updateCoach'
    _format: json
  requirements:
    _permission: 'edit employee users'
  methods: [POST]

reporting_user.update_job_position:
  path: '/reporting-user/update-job-position'
  defaults:
    _controller: '\Drupal\reporting_user\Controller\InlineJobPositionController::updateJobPosition'
    _format: json
  requirements:
    _permission: 'edit employee users'
  methods: [POST]
