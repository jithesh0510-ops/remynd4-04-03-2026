langcode: en
status: true
id: crs_profile_coach
migration_group: crs_migrate
label: 'CRS Profile (Coach)'
source:
  plugin: sql
  key: legacy
  query: >
    SELECT
      c.id        AS legacy_id,
      c.name      AS full_name,
      c.email     AS email,
      c.company_id AS company_legacy_id
    FROM qs_coach_master c
process:
  uid:
    plugin: migration_lookup
    migration: crs_users_coach
    source: legacy_id
  type:
    plugin: default_value
    default_value: coach
  field_full_name: full_name
  field_company:
    plugin: migration_lookup
    migration: crs_users_company
    source: company_legacy_id
destination:
  plugin: 'entity:profile'
  default_bundle: coach
migration_dependencies:
  required:
    - crs_users_company
    - crs_users_coach
