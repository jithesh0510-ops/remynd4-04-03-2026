langcode: en
status: true
id: crs_users_company
migration_group: crs_migrate
label: 'CRS Users (Company)'
source:
  plugin: sql
  key: legacy
  # TODO: adjust column names as needed in SELECT
  query: >
    SELECT
      t.id              AS legacy_id,
      t.email           AS mail,
      t.name            AS uname,
      t.created         AS created_ts
    FROM qs_company_master t
process:
  name: uname
  mail: mail
  status:
    plugin: default_value
    default_value: 1
  roles:
    plugin: default_value
    default_value:
      - company
  created:
    plugin: callback
    callable: intval
    source: created_ts
  # Set a default password for all migrated users; consider forcing reset post-import.
  pass:
    plugin: default_value
    default_value: 'Temp!ChangeMe123'
destination:
  plugin: 'entity:user'
migration_dependencies: {}
