langcode: en
status: true
id: crs_profile_employee
migration_group: crs_migrate
label: 'CRS Profile (Employee)'
source:
  plugin: sql
  key: legacy
  query: >
    SELECT
      e.id         AS legacy_id,
      e.name       AS full_name,
      e.email      AS email,
      e.company_id AS company_legacy_id,
      e.coach_id   AS coach_legacy_id
    FROM qs_employee_master e
process:
  uid:
    plugin: migration_lookup
    migration: crs_users_employee
    source: legacy_id
  type:
    plugin: default_value
    default_value: employee
  field_full_name: full_name
  field_company:
    plugin: migration_lookup
    migration: crs_users_company
    source: company_legacy_id
  field_coach:
    plugin: migration_lookup
    migration: crs_users_coach
    source: coach_legacy_id
destination:
  plugin: 'entity:profile'
  default_bundle: employee
migration_dependencies:
  required:
    - crs_users_company
    - crs_users_coach
    - crs_users_employee
