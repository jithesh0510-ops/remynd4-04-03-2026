# Lagard Starts routes
report_upload.lagard_starts_list:
  path: '/report-upload/lagard-starts'
  defaults:
    _controller: '\Drupal\report_upload\Controller\LagardStartsController::list'
    _title: 'Lagard Starts'
  requirements:
    _permission: 'view lagard starts'

report_upload.lagard_starts_add:
  path: '/report-upload/lagard-starts/add'
  defaults:
    _form: '\Drupal\report_upload\Form\LagardStartsForm'
    _title: 'Add Lagard Starts'
  requirements:
    _permission: 'add lagard starts'

report_upload.lagard_starts_edit:
  path: '/report-upload/lagard-starts/{id}/edit'
  defaults:
    _form: '\Drupal\report_upload\Form\LagardStartsForm'
    _title: 'Edit Lagard Starts'
  requirements:
    _permission: 'edit lagard starts'

report_upload.lagard_starts_delete:
  path: '/report-upload/lagard-starts/delete'
  defaults:
    _controller: '\Drupal\report_upload\Controller\LagardStartsController::bulkDelete'
    _title: 'Bulk Delete Lagard Starts'
  requirements:
    _permission: 'delete lagard starts'

# PrePost Relation routes
report_upload.prepost_relation_list:
  path: '/report-upload/prepost-relations'
  defaults:
    _controller: '\Drupal\report_upload\Controller\PrePostRelationController::list'
    _title: 'PrePost Relations'
  requirements:
    _permission: 'view prepost relation'

report_upload.prepost_relation_add:
  path: '/report-upload/prepost-relations/add'
  defaults:
    _form: '\Drupal\report_upload\Form\PrePostRelationForm'
    _title: 'Add PrePost Relation'
  requirements:
    _permission: 'add prepost relation'

report_upload.prepost_relation_edit:
  path: '/report-upload/prepost-relations/{id}/edit'
  defaults:
    _form: '\Drupal\report_upload\Form\PrePostRelationForm'
    _title: 'Edit PrePost Relation'
  requirements:
    _permission: 'edit prepost relation'

report_upload.prepost_relation_delete:
  path: '/report-upload/prepost-relations/delete'
  defaults:
    _controller: '\Drupal\report_upload\Controller\PrePostRelationController::bulkDelete'
    _title: 'Bulk Delete PrePost Relations'
  requirements:
    _permission: 'delete prepost relation'

# Combined forms page
report_upload.forms_page:
  path: '/report-upload/uploads'
  defaults:
    _controller: '\Drupal\report_upload\Controller\FormPageController::content'
    _title: 'Upload All Reports'
  requirements:
    _permission: 'access content'
