coach_reporting_system.view_questionnaire:
  path: '/coach-report/questionnaire/{nid}'
  defaults:
    _controller: '\Drupal\coach_reporting_system\Controller\QuestionnaireController::viewQuestionnaire'
    _title: 'View Questionnaire'
  requirements:
    _permission: 'access content'
    nid: \d+  # Ensures only numeric node IDs are matched

coach_reporting_system.node_override:
  path: '/node/{node}'
  defaults:
    _controller: '\Drupal\coach_reporting_system\Controller\QuestionnaireController::nodeViewOverride'
    _title_callback: '\Drupal\node\Controller\NodeViewController::title'
  requirements:
    _entity_access: 'node.view'
    node: \d+


coach_reporting_system.add_coach:
  path: '/admin/people/add-coach'
  defaults:
    _controller: '\Drupal\coach_reporting_system\Controller\CoachAddController::build'
    _title: 'Add Coach'
  requirements:
    _permission: 'administer users'

coach_reporting_system.add_company:
  path: '/admin/people/add-company'
  defaults:
    _controller: '\Drupal\coach_reporting_system\Controller\CompanyAddController::build'
    _title: 'Add Company'
  requirements:
    _permission: 'administer users'
    
    
coach_reporting_system.report:
  path: '/reports'
  defaults:
    _title: 'Coach Reporting – Report'
    _controller: '\Drupal\coach_reporting_system\Controller\ReportController::report'
  requirements:
    _permission: 'access coach reporting'

coach_reporting_system.report_result:
  path: '/reports/result'
  defaults:
    _title: 'Report Results'
    _controller: '\Drupal\coach_reporting_system\Controller\ReportResultController::viewResult'
  requirements:
    _permission: 'access coach reporting'

coach_reporting_system.performance_dashboard:
  path: '/reports/performance-dashboard'
  defaults:
    _title: 'Performance Dashboard'
    _controller: '\Drupal\coach_reporting_system\Controller\PerformanceDashboardController::view'
  requirements:
    _permission: 'access coach reporting'

coach_reporting_system.performance_dashboard_ajax_coaches:
  path: '/reports/performance-dashboard/ajax/coaches'
  defaults:
    _controller: '\Drupal\coach_reporting_system\Controller\PerformanceDashboardController::getCoachesAjax'
  requirements:
    _permission: 'access coach reporting'

coach_reporting_system.performance_dashboard_ajax_program:
  path: '/reports/performance-dashboard/ajax/program-data'
  defaults:
    _controller: '\Drupal\coach_reporting_system\Controller\PerformanceDashboardController::getProgramDataAjax'
  requirements:
    _permission: 'access coach reporting'


coach_reporting_system.session_start:
  path: '/coach/session/start'
  defaults:
    _title: 'Start a session'
    _form: '\Drupal\coach_reporting_system\Form\StartSessionForm'
  requirements:
    _role: 'coach'

coach_reporting_system.session_run:
  path: '/coach/session/run'
  defaults:
    _title: 'Session questionnaire'
    _form: '\Drupal\coach_reporting_system\Form\SessionQuestionnaireForm'
  requirements:
    _role: 'coach'




coach_reporting_system.prepost_import:
  path: '/admin/coach-reporting/prepost-import'
  defaults:
    _title: 'Pre/Post Import'
    _form: '\Drupal\coach_reporting_system\Form\PrePostImportForm'
  requirements:
    _permission: 'administer coach reporting'

coach_reporting_system.uploads:
  path: '/coach-reporting/uploads'
  defaults:
    _title: 'Upload Result'
    _controller: '\Drupal\coach_reporting_system\Controller\UploadsController::page'
  requirements:
    _permission: 'administer coach reporting'

coach_reporting_system.download_sample:
  path: '/coach-reporting/sample/{filename}'
  defaults:
    _controller: '\Drupal\coach_reporting_system\Controller\SampleFileController::downloadSample'
  requirements:
    _permission: 'administer coach reporting'
    filename: '[a-zA-Z0-9\-_]+\.csv'

