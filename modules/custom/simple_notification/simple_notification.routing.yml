simple_notification.admin_list:
  path: '/admin/content/notifications'
  defaults:
    _controller: '\Drupal\simple_notification\Controller\SimpleNotificationController::adminNotificationList'
    _title: 'All Sent Notifications'
  requirements:
    _permission: 'send simple notifications'

simple_notification.send:
  path: '/admin/content/send-notification'
  defaults:
    _form: '\Drupal\simple_notification\Form\SendNotificationForm'
    _title: 'Send Notification'
  requirements:
    _permission: 'send simple notifications'

simple_notification.user_list:
  path: '/user/{user}/notifications'
  defaults:
    _controller: '\Drupal\simple_notification\Controller\SimpleNotificationController::userNotifications'
    _title: 'Your Notifications'
  requirements:
    _permission: 'view own simple notifications'
    _entity_access: 'user.view'

simple_notification.mark_read:
  path: '/notifications/{id}/toggle-read'
  defaults:
    _controller: '\Drupal\simple_notification\Controller\SimpleNotificationController::toggleReadStatus'
    _title: 'Toggle Notification Read/Unread'
  requirements:
    _permission: 'view own simple notifications'

simple_notification.resend:
  path: '/admin/content/notifications/{id}/resend'
  defaults:
    _controller: '\Drupal\simple_notification\Controller\SimpleNotificationController::resendNotification'
    _title: 'Resend Notification'
  requirements:
    _permission: 'send simple notifications'

simple_notification.delete:
  path: '/notifications/{id}/delete'
  defaults:
    _controller: '\Drupal\simple_notification\Controller\SimpleNotificationController::deleteNotification'
    _title: 'Delete Notification'
  requirements:
    _permission: 'view own simple notifications'

simple_notification.bulk_delete:
  path: '/user/{user}/notifications/delete'
  defaults:
    _controller: '\Drupal\simple_notification\Controller\SimpleNotificationController::bulkDelete'
    _title: 'Delete Selected Notifications'
  requirements:
    _permission: 'view own simple notifications'
    _entity_access: 'user.view'
